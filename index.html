<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style/style.css">
</head>
<body>
    <div class="container">
        <div class="display">
            <div class="calculation-display">
                <p class="calculation">0</p>
            </div>
            <div class="result-display">
                <p class="result"></p>
            </div>
        </div>
        <div class="non-display">
            <button class="clear">AC</button>
            <button class="delete">⌫</button>
            <button class="operator power">%</button>
            <button class="operator divide">÷</button>

            <button class="number">7</button>
            <button class="number">8</button>
            <button class="number">9</button>
            <button class="operator add">+</button>

            <button class="number">4</button>
            <button class="number">5</button>
            <button class="number">6</button>
            <button class="operator subtract">-</button>

            <button class="number">1</button>
            <button class="number">2</button>
            <button class="number">3</button>
            <button class="operator multiply">×</button>

            <button class="number zero">0</button>
            <button class="decimal">.</button>
            <button style="width: 130px; border-radius: 20px;" class = 'operator equals'>=</button>            
        </div>
    </div>
    <footer class="footer">Copyright © Hyper_21</footer>
</body>
</html>
